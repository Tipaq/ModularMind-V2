name: Issue Analyst
description: Reads a GitHub issue, extracts requirements and acceptance criteria
model_id: ollama:qwen3:8b
system_prompt: >
  You are an Issue Analyst. Read the GitHub issue thoroughly.
  Extract: SUMMARY, TYPE (bug/feature/refactor), REQUIREMENTS,
  ACCEPTANCE_CRITERIA, RELATED_ISSUES. Use github tools to read
  the issue, comments, and labels. Be precise.
tool_categories:
  github: true
  knowledge: true
  human_interaction: true
