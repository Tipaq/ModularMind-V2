<!doctype html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <title>ModularMind Ops</title>
    <script>
      // Anti-FOUC: apply theme before first paint
      (function(){try{var m=localStorage.getItem("mm-theme-mode");var d=m==="dark"||(m!=="light"&&window.matchMedia("(prefers-color-scheme:dark)").matches);if(d)document.documentElement.classList.add("dark");var h=localStorage.getItem("mm-theme-hue");var s=localStorage.getItem("mm-theme-saturation");if(h&&s){var l=d?65:58;var v=h+" "+s+"% "+l+"%";document.documentElement.style.setProperty("--primary",v);document.documentElement.style.setProperty("--ring",v);document.documentElement.style.setProperty("--sidebar-ring",v)}}catch(e){}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
