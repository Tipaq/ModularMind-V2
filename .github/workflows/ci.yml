# =============================================================================
# CI — Lint, Test, Build on every PR to main
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------------------------
  # Lint — Python (ruff) + TypeScript (turbo lint)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install ruff

      - name: Lint Python
        run: |
          ruff check shared/
          ruff check engine/server/

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint TypeScript
        run: pnpm lint

  # ---------------------------------------------------------------------------
  # Test Python — unit + integration (postgres, redis, qdrant)
  # ---------------------------------------------------------------------------
  test-python:
    name: Test Python
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: modularmind_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports: ["6333:6333"]
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/localhost/6333' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
          --health-start-period 10s

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/modularmind_test
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333
      SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e "shared/[dev]"
          pip install -e "engine/server/[dev]"

      - name: Run tests with coverage
        run: |
          cd engine/server
          pytest --cov=src --cov-report=json:coverage.json --cov-report=term -q

      - name: Check coverage ratchet
        run: |
          python - <<'PYEOF'
          import json, sys

          # Read current coverage
          try:
              with open("engine/server/coverage.json") as f:
                  current = round(json.load(f)["totals"]["percent_covered"], 2)
          except FileNotFoundError:
              print("No coverage report found — no tests ran?")
              sys.exit(0)

          # Read threshold
          with open(".coverage-threshold.json") as f:
              threshold = json.load(f)["python"]

          print(f"Python coverage: {current}% (threshold: {threshold}%)")

          if current < threshold:
              print(f"FAIL — coverage dropped below ratchet ({current}% < {threshold}%)")
              sys.exit(1)

          print("OK")
          PYEOF

  # ---------------------------------------------------------------------------
  # Test TypeScript — vitest (skipped if not configured)
  # ---------------------------------------------------------------------------
  test-ts:
    name: Test TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Check coverage ratchet
        if: success()
        run: |
          if [ ! -f packages/ui/coverage/coverage-summary.json ]; then
            echo "::notice::No TS coverage report — skipping ratchet check"
            exit 0
          fi
          python3 - <<'PYEOF'
          import json, sys

          with open("packages/ui/coverage/coverage-summary.json") as f:
              current = round(json.load(f)["total"]["lines"]["pct"], 2)

          with open(".coverage-threshold.json") as f:
              threshold = json.load(f)["typescript"]

          print(f"TypeScript coverage: {current}% (threshold: {threshold}%)")

          if current < threshold:
              print(f"FAIL — coverage dropped below ratchet ({current}% < {threshold}%)")
              sys.exit(1)

          print("OK")
          PYEOF

  # ---------------------------------------------------------------------------
  # Build — verify all apps compile
  # ---------------------------------------------------------------------------
  build-check:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
