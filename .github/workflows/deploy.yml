# =============================================================================
# CD — Build images, push to GHCR, deploy to VPS on push to main
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false  # never cancel a running deploy

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

permissions:
  contents: write   # for coverage ratchet auto-commit
  packages: write   # for GHCR push

jobs:
  # ---------------------------------------------------------------------------
  # CI gate — same checks as ci.yml
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install ruff

      - name: Lint Python
        run: |
          ruff check shared/
          ruff check engine/server/

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint TypeScript
        run: pnpm lint

  test-python:
    name: Test Python
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: modularmind_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports: ["6333:6333"]
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/localhost/6333' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
          --health-start-period 10s

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/modularmind_test
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333
      SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e "shared/[dev]"
          pip install -e "engine/server/[dev]"

      - name: Run tests with coverage
        run: |
          cd engine/server
          pytest --cov=src --cov-report=json:coverage.json --cov-report=term -q

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: engine/server/coverage.json

  test-ts:
    name: Test TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: coverage/coverage-summary.json
          if-no-files-found: ignore

  build-check:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ---------------------------------------------------------------------------
  # Build Docker images & push to GHCR
  # ---------------------------------------------------------------------------
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test-python, test-ts, build-check]

    strategy:
      matrix:
        include:
          - image: engine
            dockerfile: engine/server/Dockerfile
            context: .
          - image: gateway
            dockerfile: gateway/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/modularmind-${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/modularmind-${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy to VPS via SSH
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-images]
    environment: production

    steps:
      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ env.OWNER }}
          SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REGISTRY,OWNER,SHA,GHCR_TOKEN,GITHUB_ACTOR
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.VPS_DEPLOY_PATH }}"
            cd "$DEPLOY_DIR"

            # --- Pull latest code (for compose files, nginx config, etc.) ---
            git pull origin main

            # --- Login to GHCR & pull pre-built images ---
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            for img in engine gateway; do
              docker pull "$REGISTRY/$OWNER/modularmind-$img:sha-$SHA"
              docker tag "$REGISTRY/$OWNER/modularmind-$img:sha-$SHA" \
                         "$REGISTRY/$OWNER/modularmind-$img:latest"
            done

            # --- Run engine DB migrations (Alembic) ---
            docker compose -f docker/docker-compose.yml \
              --env-file docker/.env run --rm engine alembic upgrade head

            # --- Deploy client stack ---
            docker compose -f docker/docker-compose.yml --env-file docker/.env up -d

            # --- Health check (wait for Docker healthchecks) ---
            echo "Waiting for services to become healthy..."
            timeout 120 bash -c 'until docker compose -f docker/docker-compose.yml --env-file docker/.env ps engine --format "{{.Health}}" | grep -q healthy; do sleep 5; done' \
              || { echo "Engine health check timed out"; docker compose -f docker/docker-compose.yml --env-file docker/.env logs engine --tail 50; exit 1; }
            echo "Engine healthy"

            # --- Cleanup old images ---
            docker image prune -f

            echo "Deploy complete: sha-$SHA"

  # ---------------------------------------------------------------------------
  # Update coverage ratchet (auto-commit threshold increase)
  # ---------------------------------------------------------------------------
  update-coverage-ratchet:
    name: Update Coverage Ratchet
    runs-on: ubuntu-latest
    needs: [test-python, test-ts]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: .artifacts

      - name: Update thresholds
        run: |
          python3 - <<'PYEOF'
          import json, sys, os

          threshold_file = ".coverage-threshold.json"
          with open(threshold_file) as f:
              thresholds = json.load(f)

          updated = False

          # Python coverage
          py_cov_file = ".artifacts/coverage.json"
          if os.path.exists(py_cov_file):
              with open(py_cov_file) as f:
                  py_current = round(json.load(f)["totals"]["percent_covered"], 2)
              if py_current > thresholds["python"]:
                  print(f"Python coverage increased: {thresholds['python']}% → {py_current}%")
                  thresholds["python"] = py_current
                  updated = True

          # TypeScript coverage
          ts_cov_file = ".artifacts/coverage-summary.json"
          if os.path.exists(ts_cov_file):
              with open(ts_cov_file) as f:
                  ts_current = round(json.load(f)["total"]["lines"]["pct"], 2)
              if ts_current > thresholds["typescript"]:
                  print(f"TypeScript coverage increased: {thresholds['typescript']}% → {ts_current}%")
                  thresholds["typescript"] = ts_current
                  updated = True

          if updated:
              with open(threshold_file, "w") as f:
                  json.dump(thresholds, f, indent=2)
                  f.write("\n")
              print("Thresholds updated")
          else:
              print("No coverage increase — nothing to update")
              # Signal no commit needed
              with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
                  f.write("skip=true\n")
          PYEOF

      - name: Commit updated thresholds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .coverage-threshold.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update coverage ratchet [skip ci]"
          git push
