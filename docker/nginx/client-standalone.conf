# =============================================================================
# Nginx — Standalone client deployment (single port 8080)
# =============================================================================
# Used by docker-compose.client.yml — clients put their own reverse proxy
# (Traefik, Caddy, Nginx, etc.) in front of this on 80/443.

upstream engine {
    server engine:8000;
}

server {
    listen 8080;
    server_name _;

    # Docker DNS resolver (enables runtime resolution for optional services)
    resolver 127.0.0.11 valid=30s;

    # --- Engine API (REST + SSE) ---
    location /api/ {
        proxy_pass http://engine;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 100M;
    }

    # Health check → Engine
    location /health {
        proxy_pass http://engine;
    }

    # Webhooks → Engine
    location /webhooks/ {
        proxy_pass http://engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Gateway API (optional — resolves at request time, not startup) ---
    location /gateway/ {
        set $gateway_upstream http://gateway:8200;
        proxy_pass $gateway_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # --- Ops Console (static SPA at /ops/) ---
    location /ops/ {
        alias /usr/share/nginx/html/ops/;
        try_files $uri $uri/ /ops/index.html;
    }

    # Redirect /ops to /ops/
    location = /ops {
        return 301 /ops/;
    }

    # --- Chat (static SPA, catch-all) ---
    location / {
        root /usr/share/nginx/html/chat;
        try_files $uri $uri/ /index.html;
    }
}
