# =============================================================================
# Nginx — SPA static server (Chat + Ops)
# =============================================================================

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok";
    }

    # Ops SPA — redirect /ops to /ops/ (nginx location /ops/ won't match without trailing slash)
    location = /ops {
        return 301 /ops/;
    }

    # Ops SPA — hashed assets (immutable cache)
    location /ops/assets/ {
        alias /usr/share/nginx/html/ops/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Ops SPA — all /ops/* routes fallback to ops/index.html
    location /ops/ {
        alias /usr/share/nginx/html/ops/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /usr/share/nginx/html/ops/index.html;
    }

    # Chat SPA — hashed assets (immutable cache)
    location /assets/ {
        alias /usr/share/nginx/html/chat/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Chat SPA — all other routes fallback to chat/index.html
    location / {
        root /usr/share/nginx/html/chat;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
