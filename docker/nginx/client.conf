# =============================================================================
# ModularMind V2 — Client Reverse Proxy (single domain)
# =============================================================================
# All services on same origin — HttpOnly cookies work everywhere, no CORS.

server {
    listen 80;
    server_name _;

    # Chat app — static files served by nginx
    location / {
        proxy_pass http://chat:80;
    }

    # Ops Console — Next.js SSR with basePath=/ops
    location /ops/ {
        proxy_pass http://ops:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Engine API — REST + SSE streaming
    location /api/ {
        proxy_pass http://engine:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support — disable buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # Engine health check
    location /health {
        proxy_pass http://engine:8000;
    }
}
