# =============================================================================
# Nginx — Client deployment (Engine API + Chat SPA + Ops SPA)
# =============================================================================

upstream engine {
    server engine:8000;
}

upstream gateway {
    server gateway:8200;
}

server {
    listen 80;
    server_name _;

    # --- Engine API (REST + SSE) ---
    location /api/ {
        proxy_pass http://engine;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 100M;
    }

    # Health check → Engine
    location /health {
        proxy_pass http://engine;
    }

    # Webhooks → Engine
    location /webhooks/ {
        proxy_pass http://engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Gateway API (admin approval + audit endpoints, SSE) ---
    location /gateway/ {
        proxy_pass http://gateway/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # --- Ops Console (static SPA at /ops/) ---
    location /ops/ {
        alias /usr/share/nginx/html/ops/;
        try_files $uri $uri/ /ops/index.html;
    }

    # Redirect /ops to /ops/
    location = /ops {
        return 301 /ops/;
    }

    # --- Chat (static SPA, catch-all) ---
    location / {
        root /usr/share/nginx/html/chat;
        try_files $uri $uri/ /index.html;
    }
}
