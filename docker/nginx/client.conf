# =============================================================================
# Nginx — Client deployment (Engine API + Chat SPA + Ops SPA)
# =============================================================================

upstream engine {
    server engine:8000;
}

server {
    listen 80;
    server_name _;

    # --- API → Engine ---
    location /api/ {
        proxy_pass http://engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Health check → Engine
    location /health {
        proxy_pass http://engine;
    }

    # --- Chat SPA (static files) ---
    location / {
        root /usr/share/nginx/html/chat;
        try_files $uri $uri/ /index.html;
    }

    # --- Ops SPA (static files) ---
    location /ops/ {
        alias /usr/share/nginx/html/ops/;
        try_files $uri $uri/ /ops/index.html;
    }
}
