# =============================================================================
# ModularMind V2 — Platform Deployment (Owner's home server)
# =============================================================================
# Platform = Next.js full-stack (vitrine + studio + admin)
#
# Designed for Traefik reverse proxy. Set PLATFORM_DOMAIN in .env.platform.
#
# Usage:
#   cd docker
#   cp .env.platform.example .env.platform   # fill in values
#   docker compose -f docker-compose.platform.yml --env-file .env.platform up -d

name: modularmind-platform

services:
  migrate:
    image: ghcr.io/tipaq/modularmind-platform-migrate:${MM_VERSION:-latest}
    environment:
      DATABASE_URL: postgresql://${DB_USER:-modularmind}:${DB_PASSWORD}@db:5432/modularmind_platform
    depends_on:
      db: { condition: service_healthy }
    restart: "no"

  web:
    image: ghcr.io/tipaq/modularmind-platform:${MM_VERSION:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-modularmind}:${DB_PASSWORD}@db:5432/modularmind_platform
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://${PLATFORM_DOMAIN}
      GHCR_READ_TOKEN: ${GHCR_READ_TOKEN:-}
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    labels:
      traefik.enable: "true"
      traefik.http.routers.modularmind-platform.rule: Host(`${PLATFORM_DOMAIN}`)
      traefik.http.routers.modularmind-platform.entrypoints: websecure
      traefik.http.routers.modularmind-platform.tls.certresolver: letsencrypt
      traefik.http.services.modularmind-platform.loadbalancer.server.port: "3000"
    networks:
      - default
      - proxy-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-modularmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: modularmind_platform
    volumes:
      - platform-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-modularmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy-network:
    external: true

volumes:
  platform-postgres-data:
    name: modularmind_platform-postgres-data
    external: true
