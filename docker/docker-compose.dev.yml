# =============================================================================
# ModularMind V2 — Development (infra services only, apps run locally)
# =============================================================================
# In dev: run engine via `make dev-engine`, chat/ops via `make dev-chat`/`make dev-ops`

name: modularmind

x-engine-env: &engine-env
  DATABASE_URL: postgresql+asyncpg://modularmind:modularmind@db:5432/modularmind
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  OLLAMA_BASE_URL: http://ollama:11434
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: modularmind
  S3_SECRET_KEY: modularmind
  SECRET_KEY: dev-secret-key
  PLATFORM_URL: http://host.docker.internal:3000
  ENGINE_API_KEY: mmk_dev-engine-api-key-2024
  DEBUG: "true"

x-engine-depends: &engine-depends
  db: { condition: service_healthy }
  redis: { condition: service_healthy }
  qdrant: { condition: service_healthy }
  minio: { condition: service_healthy }

services:
  engine:
    image: modularmind/engine:dev
    build:
      context: ..
      dockerfile: engine/server/Dockerfile
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ../engine/server/src:/app/src
      - ../engine/server/seed:/app/seed
      - ../engine/server/seeds:/app/seeds
      - ../engine/server/alembic:/app/alembic
      - ../engine/server/alembic.ini:/app/alembic.ini
      - ../engine/server/entrypoint.sh:/app/entrypoint.sh
      - ../shared/src:/tmp/shared-src
      - /var/run/docker.sock:/var/run/docker.sock
      - engine-config:/data/config
    environment:
      <<: *engine-env
      GATEWAY_ENABLED: "true"
      GATEWAY_URL: http://gateway:8200
    depends_on:
      <<: *engine-depends
    entrypoint: ["sh", "/app/entrypoint.sh"]
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000

  worker:
    image: modularmind/engine:dev
    volumes:
      - ../engine/server/src:/app/src
      - ../engine/server/seed:/app/seed
      - ../engine/server/seeds:/app/seeds
      - ../shared/src:/tmp/shared-src
      - /var/run/docker.sock:/var/run/docker.sock
      - engine-config:/data/config
    environment:
      <<: *engine-env
      GATEWAY_ENABLED: "true"
      GATEWAY_URL: http://gateway:8200
    depends_on:
      engine:
        condition: service_started
      <<: *engine-depends
    entrypoint: []
    command: watchfiles --filter python "python -m src.worker.runner" /app/src

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: modularmind
      POSTGRES_PASSWORD: modularmind
      POSTGRES_DB: modularmind
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modularmind"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: modularmind
      MINIO_ROOT_PASSWORD: modularmind
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  gateway:
    image: modularmind/gateway:dev
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    ports:
      - "8200:8200"
    # Run as appuser (1000) with root group (0) for Docker socket + workspace access
    user: "1000:0"
    volumes:
      - ../gateway/src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock
      - gateway-workspaces:/data/workspaces
    environment:
      <<: *engine-env
      GATEWAY_PORT: "8200"
      GATEWAY_SANDBOX_IMAGE: modularmind/gateway-sandbox:latest
    depends_on:
      <<: *engine-depends
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8200 --workers 1

volumes:
  ollama-data:
  gateway-workspaces:
  engine-config:
