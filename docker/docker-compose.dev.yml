# =============================================================================
# ModularMind V2 — Development (infra services only, apps run locally)
# =============================================================================
# In dev: run engine via `make dev-engine`, chat/ops via `make dev-chat`/`make dev-ops`

name: mm-engine

x-engine-env: &engine-env
  DATABASE_URL: postgresql+asyncpg://modularmind:modularmind@db:5432/modularmind
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  OLLAMA_BASE_URL: http://ollama:11434
  SECRET_KEY: dev-secret-key
  PLATFORM_URL: http://host.docker.internal:3000
  ENGINE_API_KEY: mmk_dev-engine-api-key-2024
  DEBUG: "true"

x-engine-depends: &engine-depends
  db: { condition: service_healthy }
  redis: { condition: service_healthy }
  qdrant: { condition: service_healthy }

services:
  engine:
    image: modularmind/engine:dev
    build:
      context: ..
      dockerfile: engine/server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../engine/server/src:/app/src
      - ../engine/server/seeds:/app/seeds
      - ../engine/server/alembic:/app/alembic
      - ../engine/server/alembic.ini:/app/alembic.ini
      - ../shared/src:/tmp/shared-src
    environment:
      <<: *engine-env
    depends_on:
      <<: *engine-depends
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000

  worker:
    image: modularmind/engine:dev
    volumes:
      - ../engine/server/src:/app/src
      - ../engine/server/seeds:/app/seeds
      - ../shared/src:/tmp/shared-src
    environment:
      <<: *engine-env
    depends_on:
      <<: *engine-depends
    command: python -m src.worker.runner

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: modularmind
      POSTGRES_PASSWORD: modularmind
      POSTGRES_DB: modularmind
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modularmind"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
