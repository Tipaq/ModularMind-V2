# =============================================================================
# ModularMind V2 — Client Deployment (Engine + Worker + Nginx + Infra)
# =============================================================================
# 7 containers: nginx, engine, worker, db, redis, qdrant, ollama
# Chat + Ops are static SPAs baked into the nginx image (no dedicated containers)

x-engine-env: &engine-env
  DATABASE_URL: postgresql+asyncpg://${DB_USER:-modularmind}:${DB_PASSWORD}@db:5432/modularmind
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  OLLAMA_BASE_URL: http://ollama:11434
  SECRET_KEY: ${SECRET_KEY}
  PLATFORM_URL: ${PLATFORM_URL:-}
  ENGINE_API_KEY: ${ENGINE_API_KEY:-}

x-engine-depends: &engine-depends
  db: { condition: service_healthy }
  redis: { condition: service_healthy }
  qdrant: { condition: service_healthy }

services:
  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    volumes: [postgres-data:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: modularmind
      POSTGRES_USER: ${DB_USER:-modularmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-modularmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes: [redis-data:/data]
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  qdrant:
    image: qdrant/qdrant:v1.13.0
    volumes: [qdrant-data:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s

  ollama:
    image: ollama/ollama:latest
    volumes: [ollama-data:/root/.ollama]
    profiles: [ollama]

  # --- Engine (single image, 2 services) ---
  engine:
    build:
      context: ..
      dockerfile: engine/server/Dockerfile
    image: modularmind/engine:latest
    depends_on: *engine-depends
    environment:
      <<: *engine-env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  worker:
    image: modularmind/engine:latest
    command: python -m src.worker.runner
    depends_on: *engine-depends
    environment:
      <<: *engine-env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- Nginx (Chat + Ops static baked in, proxies Engine API) ---
  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    image: modularmind/nginx:latest
    volumes:
      - ./nginx/client.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on: [engine]

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  ollama-data:
