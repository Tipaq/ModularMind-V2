# =============================================================================
# ModularMind V2 — Client Deployment (Engine + Worker + Nginx + Infra)
# =============================================================================
# 7 containers: nginx, engine, worker, db, redis, qdrant, ollama
# Chat + Ops are static SPAs served directly by nginx (no dedicated containers)

x-engine-env: &engine-env
  DATABASE_URL: postgresql+asyncpg://${DB_USER:-modularmind}:${DB_PASSWORD}@db:5432/modularmind
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  OLLAMA_BASE_URL: http://ollama:11434
  SECRET_KEY: ${SECRET_KEY}
  PLATFORM_URL: ${PLATFORM_URL:-}
  ENGINE_API_KEY: ${ENGINE_API_KEY:-}

x-engine-depends: &engine-depends
  db: { condition: service_healthy }
  redis: { condition: service_healthy }
  qdrant: { condition: service_healthy }

services:
  # --- Engine (FastAPI API server) ---
  engine:
    image: modularmind/engine:latest
    build:
      context: ..
      dockerfile: engine/server/Dockerfile
    environment:
      <<: *engine-env
    depends_on:
      <<: *engine-depends
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Worker (Redis Streams consumers + APScheduler) ---
  worker:
    image: modularmind/engine:latest
    command: python -m src.worker.runner
    environment:
      <<: *engine-env
    depends_on:
      <<: *engine-depends
      engine: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Nginx (reverse proxy + static SPA hosting) ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/client.conf:/etc/nginx/conf.d/default.conf:ro
      - chat-static:/usr/share/nginx/html/chat:ro
      - ops-static:/usr/share/nginx/html/ops:ro
    depends_on:
      - engine

  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-modularmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-modularmind}
      POSTGRES_DB: modularmind
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-modularmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.0
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  ollama-data:
  chat-static:
  ops-static:
