# =============================================================================
# ModularMind V2 — Client Deployment (Engine + Apps + Infra)
# =============================================================================

x-engine-env: &engine-env
  DATABASE_URL: postgresql+asyncpg://${DB_USER:-modularmind}:${DB_PASSWORD}@db:5432/modularmind
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  OLLAMA_BASE_URL: http://ollama:11434
  SECRET_KEY: ${SECRET_KEY}

x-engine-depends: &engine-depends
  db: { condition: service_healthy }
  redis: { condition: service_healthy }
  qdrant: { condition: service_healthy }

services:
  # --- Engine ---
  engine:
    image: modularmind/engine:latest
    build:
      context: ..
      dockerfile: engine/server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *engine-env
      EXECUTION_MODE: celery
    depends_on:
      <<: *engine-depends
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    image: modularmind/engine:latest
    command: celery -A src.workers.celery_app worker -l info -Q default,executions,models,fine_tuning -c 4
    environment:
      <<: *engine-env
    depends_on:
      <<: *engine-depends

  celery-beat:
    image: modularmind/engine:latest
    command: celery -A src.workers.celery_app beat -l info
    environment:
      <<: *engine-env
    depends_on:
      <<: *engine-depends

  pipeline-worker:
    image: modularmind/engine:latest
    command: python -m src.pipeline.consumer
    environment:
      <<: *engine-env
    depends_on:
      <<: *engine-depends
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Apps ---
  chat:
    build:
      context: ..
      dockerfile: apps/chat/Dockerfile
    ports:
      - "3000:80"

  ops:
    build:
      context: ..
      dockerfile: apps/ops/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production

  # --- Nginx ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/client.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - engine
      - chat
      - ops

  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-modularmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-modularmind}
      POSTGRES_DB: modularmind
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-modularmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.0
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  ollama-data:
