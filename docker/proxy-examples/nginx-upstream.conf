# =============================================================================
# Nginx — External reverse proxy config for ModularMind
# =============================================================================
# Place in /etc/nginx/sites-enabled/modularmind.conf on the host.
# Assumes ModularMind's built-in nginx runs on localhost:8080 (proxy profile).
#
# Install certbot for Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d mm.example.com

upstream modularmind {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name mm.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mm.example.com;

    ssl_certificate     /etc/letsencrypt/live/mm.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mm.example.com/privkey.pem;

    location / {
        proxy_pass http://modularmind;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (engine streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;

        # File uploads
        client_max_body_size 100M;
    }
}
