# =============================================================================
# ModularMind V2 — Studio Deployment (Owner only)
# =============================================================================

services:
  studio-backend:
    build:
      context: ..
      dockerfile: studio/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-modularmind}:${DB_PASSWORD}@db:5432/modularmind_studio
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  studio-frontend:
    build:
      context: ..
      dockerfile: studio/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/studio.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - studio-backend
      - studio-frontend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-modularmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-modularmind}
      POSTGRES_DB: modularmind_studio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-modularmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
